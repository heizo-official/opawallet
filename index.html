<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OpaWallet</title>

<style>

body{
margin:0;
background:#ffffff;
color:#111;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:30px;
}

.logo{
width:180px;
border-radius:35px;
margin-bottom:20px;
box-shadow:0 8px 25px rgba(255,122,0,.25);
}

h1{
font-size:42px;
margin:0;
}

span{
color:#ff7a00;
}

p{
color:#aaa;
margin-top:10px;
}

.button{
display:inline-block;
margin-top:30px;
padding:14px 28px;
background:#ff7a00;
color:white;
text-decoration:none;
border-radius:12px;
font-weight:bold;
}

</style>

<script type="module">
import { MiniKit } from "https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js@latest/+esm";

window.MiniKit = MiniKit;

MiniKit.install();
</script>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<a class="button" id="loginBtn" href="#">
    Sign In OpaWallet
</a>

</div>

<script>

if(localStorage.getItem("opaLogged") === "true"){
    window.location.href = "dashboard.html";
}

document.getElementById("loginBtn").addEventListener("click", async () => {

    if (typeof MiniKit === "undefined") {
        alert("Open inside World App");
        return;
    }

    const nonce = "OPAWALLET2026";

    const result = await MiniKit.walletAuth({
        nonce,
        statement: "Sign in to OpaWallet"
    });

    if (result.executedWith === "fallback") {
        return;
    }

    localStorage.setItem("opaLogged", "true");

    localStorage.setItem(
        "walletAddress",
        result.data.address
    );

    window.location.href = "dashboard.html";

});

</script>

</body>
</html>
