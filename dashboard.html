<script>

function showPage(pageId, button){

document.getElementById("wallet-page").style.display="none";
document.getElementById("tokens-page").style.display="none";
document.getElementById("swap-page").style.display="none";

document.getElementById(pageId).style.display="block";

document.querySelectorAll(".nav-btn").forEach(btn=>{
btn.classList.remove("active");
});

button.classList.add("active");

}

async function connectWallet() {

    if(typeof MiniKit === "undefined"){

        document.getElementById("wallet-address").innerText =
        "World App Only";

        document.getElementById("wallet-status").innerText =
        "Open inside World App";

        return;
    }   

}

let currentTokenButton = null;
let selectedDetailToken = "";

const SWAP_API =
"https://opawallet-swap.heizoai.workers.dev/swap";

let swapQuote = null;
let swapQuoteTimer = null;

const savedAddress =
    localStorage.getItem("walletAddress");

if(savedAddress){

    const shortAddress =
        savedAddress.slice(0,6) +
        "..." +
        savedAddress.slice(-4);

    document.getElementById("wallet-address").innerText =
        shortAddress;

    document.getElementById("wallet-status").innerText =
        "Connected";
}

async function loadAssets(){

const address =
localStorage.getItem("walletAddress");

if(!address){
return;
}

try{

const response = await fetch(
`https://opawallet-portfolio.heizoai.workers.dev/assets?address=${address}`
);

const data = await response.json();

if(!data.success){
return;
}

const assets =
data.assets
.filter(asset => asset.balance > 0)
.sort((a,b) => b.usdValue - a.usdValue);

document.getElementById("assets-list").innerHTML =
assets.map(asset => `

<div
class="token-item wallet-token"
onclick="openTokenDetails(this)"
data-symbol="${asset.symbol}"
data-price="${asset.price}"
data-balance="${asset.balance}"
data-address="${asset.contract}"
data-value="${asset.usdValue}"
data-change="${asset.change24h}"
data-marketcap="${asset.marketCap}"
data-liquidity="${asset.liquidity}"
data-volume="${asset.volume24h}"
>

    <div class="token-left">

        <div class="token-icon">

<img
src="${asset.logo}"
alt="${asset.symbol}"
style="
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
"
onerror="this.remove();this.parentNode.innerHTML='${asset.symbol.substring(0,1)}';">

</div>

        <div>

            <div class="token-name">
                ${asset.symbol}
            </div>

            <div class="token-network">
                ${asset.balance.toLocaleString()}
            </div>

        </div>

    </div>

    <div style="text-align:right;">

        <div class="token-balance">
            $${asset.usdValue.toFixed(2)}
        </div>

        <div style="
            font-size:13px;
            color:${asset.change24h >= 0 ? '#00a86b' : '#ff4d4f'};
            font-weight:600;
        ">
            ${asset.change24h.toFixed(2)}%
        </div>

    </div>

</div>

`).join("");

}catch(error){
    
console.error(error);

}

}

loadAssets();

loadMarkets();

window.swapTokensList = [];

fetch(
`${SWAP_API}?address=${localStorage.getItem("walletAddress")}`

let startY = 0;
let pulling = false;

const pullRefresh =
document.getElementById("pull-refresh");

const refreshIndicator =
document.getElementById("refresh-indicator");

pullRefresh.addEventListener("touchstart",(e)=>{

    if(window.scrollY > 0) return;

    startY = e.touches[0].clientY;
    pulling = true;

});

pullRefresh.addEventListener("touchmove",(e)=>{

    if(!pulling) return;

    const distance =
        e.touches[0].clientY - startY;

    if(distance <= 0) return;

    const move =
        Math.min(distance * 0.6, 130);

    document.getElementById("assets-list").style.transform =
        `translateY(${move}px)`;

    refreshIndicator.style.top =
    (move - 120) + "px";

    refreshIndicator.style.opacity = "1";

});

pullRefresh.addEventListener("touchend", async ()=>{

    pulling = false;

    const current =
        parseFloat(
            document.getElementById("assets-list")
            .style.transform
            .replace("translateY(","")
            .replace("px)","")
        ) || 0;

    if(current >= 90){

        refreshIndicator.classList.add("spinning");

        await loadAssets();

        refreshIndicator.classList.remove("spinning");

    }

    document.getElementById("assets-list").style.transition =
        "transform .25s ease";

    document.getElementById("assets-list").style.transform =
        "translateY(0px)";
    
    refreshIndicator.style.top = "-60px";
    refreshIndicator.style.opacity = "0";

    setTimeout(()=>{

        document.getElementById("assets-list").style.transition = "";

    },250);

});

function formatCompact(value){

    value = Number(value || 0);

    if(value >= 1000000000){
        return (value / 1000000000).toFixed(1).replace(".0","") + "B";
    }

    if(value >= 1000000){
        return (value / 1000000).toFixed(1).replace(".0","") + "M";
    }

    if(value >= 1000){
        return (value / 1000).toFixed(1).replace(".0","") + "K";
    }

    return value.toFixed(0);
}

function formatPrice(price){

    price = Number(price || 0);

    if(price < 0.0001 && price > 0){

        const str = price.toFixed(20);

        const match = str.match(/^0\.(0+)(\d+)/);

        if(match){

            const zeroCount = match[1].length;

            const digits =
                match[2]
                .replace(/0+$/,"")
                .substring(0,4);

            return `0.0<span class="zero-count">${zeroCount}</span>${digits}`;
        }
    }

    if(price < 0.001){
        return price.toFixed(5);
    }

    if(price < 1){
        return price.toFixed(4);
    }

    if(price < 10000){
        return price.toFixed(2);
    }

    return Math.round(price).toLocaleString();
}

async function updateSwapQuote(){

const address =
localStorage.getItem("walletAddress");

if(!address) return;

const buttons =
document.querySelectorAll(".token-select");

const amounts =
document.querySelectorAll(".swap-amount");

if(buttons.length < 2 || amounts.length < 2) return;

const fromSymbol =
buttons[0].innerText.replace("▼","").trim();

const toSymbol =
buttons[1].innerText.replace("▼","").trim();

const amount =
Number(amounts[0].value);

if(!amount) return;

const fromToken =
window.swapTokensList.find(
t=>t.symbol===fromSymbol
);

const toToken =
window.swapTokensList.find(
t=>t.symbol===toSymbol
);

if(!fromToken || !toToken) return;

const response =
await fetch(
`${SWAP_API}?address=${address}&from=${fromToken.address}&to=${toToken.address}&amount=${amount}`
);

swapQuote =
await response.json();

if(
swapQuote.success
){

amounts[1].value =
swapQuote.amountOut;

}

}

async function swap(){

    const response = await fetch(
    "https://opawallet-swap-v2.heizoai.workers.dev",
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            action: "quote",
            type: "EXACT_INPUT",
            amount: "1000000",
            tokenInChainId: 480,
            tokenOutChainId: 480,
            tokenIn: "0x79A02482A880bCE3F13e09Da970dC34db4CD24d1",
            tokenOut: "0x4200000000000000000000000000000000000006",
            swapper: localStorage.getItem("walletAddress"),
            slippageTolerance: 0.5
        })
    }
);

const data = await response.json();

try {

    const signResult = await window.MiniKit.signTypedData({
        domain: data.permitData.domain,
        types: data.permitData.types,
        primaryType: "PermitSingle",
        message: data.permitData.values
    });

    alert(JSON.stringify(signResult, null, 2));

} catch (e) {

    alert(JSON.stringify(e, null, 2));
    alert(e?.message);
    alert(e?.code);

}

}
