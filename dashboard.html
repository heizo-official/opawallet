<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OpaWallet</title>

<style>

body{
margin:0;
background:#ffffff;
color:#111;
font-family:Arial,sans-serif;
}

.header{
padding:20px;
font-size:24px;
font-weight:bold;
}

.wallet-card{
margin:4px;
padding:10px;
background:#111;
border-radius:20px;
text-align:center;
transform:translateY(-20px);
}

.balance-label{
color:#888;
font-size:14px;
}

.balance{
font-size:42px;
font-weight:bold;
margin-top:10px;
color:#ffffff; 
}

.token{
color:#ff7a00;
}

.actions{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
}

.btn{
background:#ffffff;
color:#111;
padding:12px 24px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
}

.section{
padding:20px;
}

.section-title{
font-size:20px;
margin-bottom:15px;
}

.empty{
color:#666;
}

.token-item{
background:white;
border:1px solid #e5e5e5;
border-radius:16px;
padding:15px;
margin-top:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.token-name{
font-size:18px;
font-weight:bold;
color:#111;
}

.token-network{
font-size:13px;
color:#888;
margin-top:3px;
}

.token-balance{
font-size:18px;
font-weight:bold;
color:#111;
}
  
</style>
</head>

<body>

<div class="header">
OpaWallet
</div>

<div class="wallet-card">

<div class="balance-label">
Total Balance
</div>

<div class="balance">
0.00 <span class="token">USD</span>
</div>

<div class="usd-value">
≈ $0.00 USD
</div>

<div class="actions">
<a href="#" class="btn">Send</a>
<a href="#" class="btn">Receive</a>
</div>

</div>

<div class="section">

<div class="section-title">
Assets
</div>

<div class="token-item">
<div>
<div class="token-name">USDC</div>
<div class="token-amount">0.00 USDC</div>
</div>

<div class="token-balance">
0.00
</div>
</div>

<div class="token-item">
<div>
<div class="token-name">WLD</div>
<div class="token-amount">0.00 WLD</div>
</div>

<div class="token-balance">
0.00
</div>
</div>

<div class="token-item">
<div>
<div class="token-name">OPA</div>
<div class="token-amount">0.00 OPA</div>
</div>

<div class="token-balance">
0.00
</div>
</div>

</div>

</body>
</html>
