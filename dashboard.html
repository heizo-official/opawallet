<script>

function showPage(pageId, button){

document.getElementById("wallet-page").style.display="none";
document.getElementById("tokens-page").style.display="none";
document.getElementById("swap-page").style.display="none";

document.getElementById(pageId).style.display="block";

document.querySelectorAll(".nav-btn").forEach(btn=>{
btn.classList.remove("active");
});

button.classList.add("active");

}

async function connectWallet() {

    if(typeof MiniKit === "undefined"){

        document.getElementById("wallet-address").innerText =
        "World App Only";

        document.getElementById("wallet-status").innerText =
        "Open inside World App";

        return;
    }

    document.getElementById("wallet-address").innerText =
    "Connecting...";

    document.getElementById("wallet-status").innerText =
    "Waiting for World App";

    const nonce = "OPAWALLET2026";

const result = await MiniKit.walletAuth({
    nonce,
    statement: "Sign in to OpaWallet"
});

if (result.executedWith === "fallback") {
    return;
}

const shortAddress =
    result.data.address.slice(0,6) +
    "..." +
    result.data.address.slice(-4);

document.getElementById("wallet-address").innerText =
    shortAddress;

document.getElementById("wallet-status").innerText =
    "Connected";

}

let currentTokenButton = null;
let selectedDetailToken = "";

function openTokenModal(button){
    currentTokenButton = button;
    document.getElementById("token-modal").style.display = "flex";
}

function closeTokenModal(){
    document.getElementById("token-modal").style.display = "none";
}

function selectToken(token){

    if(currentTokenButton){
        currentTokenButton.innerHTML = token + " ▼";
    }

    closeTokenModal();
}

function openTokenDetails(token){

    const symbol = token.dataset.symbol || "TOKEN";

    document.getElementById("detail-token-name").innerText =
        symbol;

    document.getElementById("token-details-modal").style.display =
        "flex";

    loadTokenData(symbol);
}

function closeTokenDetails(){
    document.getElementById("token-details-modal").style.display = "none";
}

async function loadTokenData(symbol){

    console.log("Buscando:", symbol);

}

function swapTokens(){

    const tokenButtons =
        document.querySelectorAll(".token-select");

    if(tokenButtons.length < 2) return;

    const topToken =
        tokenButtons[0].innerHTML;

    const bottomToken =
        tokenButtons[1].innerHTML;

    tokenButtons[0].innerHTML =
        bottomToken;

    tokenButtons[1].innerHTML =
        topToken;
}

document.addEventListener("DOMContentLoaded", () => {

    document.querySelectorAll(".token-item")
        .forEach(token => {

     token.addEventListener("click", () => {
    openTokenDetails(token);
});

        });

});

</script>
